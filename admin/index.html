<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Aja Admin</title>
  <link rel="stylesheet" href="local-editor.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <p>Aja Alloys</p>
      <h1>Admin Dashboard</h1>
      <p class="login-status" id="admin-status">Opening the admin dashboard...</p>
      <noscript>
        <p class="login-status">
          JavaScript is required. Open <a href="/admin/login.html">the admin login</a>.
        </p>
      </noscript>
    </section>
  </main>

  <script>
    (async function () {
      const statusLine = document.querySelector("#admin-status");
      const isLocalPreview = ["127.0.0.1", "localhost", ""].includes(window.location.hostname);
      const apiBase = isLocalPreview ? "/__local-admin" : "/api/post-editor";

      try {
        const response = await fetch(`${apiBase}/session`, {
          cache: "no-store",
          credentials: "same-origin"
        });
        const session = await response.json().catch(() => ({}));

        if (response.ok && session.authenticated) {
          window.location.replace("/admin/post-editor.html");
          return;
        }
      } catch (error) {
        console.error("Unable to check admin session", error);
      }

      statusLine.textContent = "Redirecting to login...";
      window.location.replace("/admin/login.html");
    })();
  </script>
</body>
</html>
