backend:
  name: github
  repo: yoebar/Aja
  branch: main
  site_domain: https://www.aja.bt
  base_url: https://www.aja.bt
  auth_endpoint: api/auth

media_folder: "assets/uploads"
public_folder: "assets/uploads"
site_url: "https://www.aja.bt"
display_url: "https://www.aja.bt"
logo_url: "https://www.aja.bt/assets/aja-logo-transparent.png"

collections:
  - name: "website_admin"
    label: "Website Admin"
    label_singular: "Website Area"
    description: "Use one page for one update. Admin users can edit website settings and advert posts."
    editor:
      preview: false
    files:
      - name: "information_heading"
        label: "Information Section Heading"
        description: "Change the heading above Notices, Vacancies, and Tenders."
        file: "content/information.json"
        format: "json"
        fields:
          - label: "Small Heading"
            name: "eyebrow"
            widget: "string"
            default: "Information"
          - label: "Main Heading"
            name: "title"
            widget: "string"
          - label: "Short Intro Text"
            name: "summary"
            widget: "text"

      - name: "notices"
        label: "Notices"
        description: "Add or edit public company notices."
        file: "content/notices.json"
        format: "json"
        fields:
          - { label: "Tab ID", name: "id", widget: "hidden", default: "news" }
          - { label: "Tab Name", name: "label", widget: "hidden", default: "Notices" }
          - { label: "Hide Panel Header", name: "hideIntro", widget: "hidden", default: true }
          - label: "Status Label"
            name: "status"
            widget: "string"
            default: "Company notices"
          - label: "Panel Heading"
            name: "title"
            widget: "string"
          - label: "Panel Intro Text"
            name: "summary"
            widget: "text"
          - label: "Button Text"
            name: "contactLabel"
            widget: "string"
            default: "Click for more"
          - label: "Enquiry Email"
            name: "contactEmail"
            widget: "string"
            default: "sales@aja.bt"
          - label: "Email Subject"
            name: "contactSubject"
            widget: "string"
            default: "Company notice enquiry"
          - label: "Notice Cards"
            name: "items"
            widget: "list"
            label_singular: "Notice"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - label: "Type"
                name: "type"
                widget: "select"
                options: ["Announcement", "Public information", "Company update", "Documentation"]
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Summary"
                name: "summary"
                widget: "text"
              - label: "Date"
                name: "postDate"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
              - label: "Action Button Text"
                name: "actionLabel"
                widget: "string"
                required: false
              - label: "Action Link"
                name: "actionUrl"
                widget: "string"
                required: false
              - label: "Images"
                name: "imageUrls"
                widget: "list"
                required: false
                field: { label: "Image", name: "image", widget: "image" }
              - label: "PDF File"
                name: "pdfUrl"
                widget: "file"
                required: false
              - label: "PDF Button Text"
                name: "pdfLabel"
                widget: "string"
                required: false

      - name: "vacancies"
        label: "Vacancies"
        description: "Add or edit open roles and recruitment notices."
        file: "content/vacancies.json"
        format: "json"
        fields:
          - { label: "Tab ID", name: "id", widget: "hidden", default: "vacancies" }
          - { label: "Tab Name", name: "label", widget: "hidden", default: "Vacancies" }
          - { label: "Hide Panel Header", name: "hideIntro", widget: "hidden", default: false }
          - label: "Status Label"
            name: "status"
            widget: "string"
            default: "Vacancies"
          - label: "Panel Heading"
            name: "title"
            widget: "string"
          - label: "Panel Intro Text"
            name: "summary"
            widget: "text"
          - label: "Button Text"
            name: "contactLabel"
            widget: "string"
            default: "Click for more"
          - label: "HR or Contact Email"
            name: "contactEmail"
            widget: "string"
            default: "sales@aja.bt"
          - label: "Email Subject"
            name: "contactSubject"
            widget: "string"
            default: "Vacancy enquiry"
          - label: "Vacancy Cards"
            name: "items"
            widget: "list"
            label_singular: "Vacancy"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - label: "Type"
                name: "type"
                widget: "select"
                options: ["Vacancy announcement", "Internship", "Contract role", "Recruitment notice"]
                default: "Vacancy announcement"
              - label: "Job Title"
                name: "title"
                widget: "string"
              - label: "Short Description"
                name: "summary"
                widget: "text"
              - label: "Date"
                name: "postDate"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
              - label: "Action Button Text"
                name: "actionLabel"
                widget: "string"
                required: false
              - label: "Action Link"
                name: "actionUrl"
                widget: "string"
                required: false
              - label: "Images"
                name: "imageUrls"
                widget: "list"
                required: false
                field: { label: "Image", name: "image", widget: "image" }
              - label: "PDF File"
                name: "pdfUrl"
                widget: "file"
                required: false
              - label: "PDF Button Text"
                name: "pdfLabel"
                widget: "string"
                required: false

      - name: "tenders"
        label: "Tenders"
        description: "Add or edit tender, supplier, and RFQ notices."
        file: "content/tenders.json"
        format: "json"
        fields:
          - { label: "Tab ID", name: "id", widget: "hidden", default: "tenders" }
          - { label: "Tab Name", name: "label", widget: "hidden", default: "Tenders" }
          - { label: "Hide Panel Header", name: "hideIntro", widget: "hidden", default: false }
          - label: "Status Label"
            name: "status"
            widget: "string"
            default: "Tender adverts"
          - label: "Panel Heading"
            name: "title"
            widget: "string"
          - label: "Panel Intro Text"
            name: "summary"
            widget: "text"
          - label: "Button Text"
            name: "contactLabel"
            widget: "string"
            default: "Click for more"
          - label: "Tender Email"
            name: "contactEmail"
            widget: "string"
            default: "sales@aja.bt"
          - label: "Email Subject"
            name: "contactSubject"
            widget: "string"
            default: "Tender enquiry"
          - label: "Tender Posts"
            name: "items"
            widget: "list"
            label_singular: "Tender Post"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - label: "Type"
                name: "type"
                widget: "select"
                options: ["Tender notice", "Supplier notice", "Request for quotation", "Tender addendum"]
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Summary"
                name: "summary"
                widget: "text"
              - label: "Date"
                name: "postDate"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
              - label: "Closing Date"
                name: "closingDate"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                required: false
              - label: "Action Button Text"
                name: "actionLabel"
                widget: "string"
                required: false
              - label: "Action Link"
                name: "actionUrl"
                widget: "string"
                required: false
              - label: "Images"
                name: "imageUrls"
                widget: "list"
                required: false
                field: { label: "Image", name: "image", widget: "image" }
              - label: "PDF File"
                name: "pdfUrl"
                widget: "file"
                required: false
              - label: "PDF Button Text"
                name: "pdfLabel"
                widget: "string"
                required: false

      - name: "contact_form"
        label: "Contact Form"
        description: "Set where website enquiries go."
        file: "content/contact-form.json"
        format: "json"
        fields:
          - label: "Small Heading"
            name: "eyebrow"
            widget: "string"
            default: "Contact"
          - label: "Contact Section Heading"
            name: "title"
            widget: "string"
          - label: "Default Recipient Email"
            name: "formRecipient"
            widget: "string"
            hint: "Used when no form endpoint is set."
          - label: "Email Subject Prefix"
            name: "formSubjectPrefix"
            widget: "string"
          - label: "Form Endpoint"
            name: "formEndpoint"
            widget: "string"
            required: false
            hint: "Optional Formspree or similar endpoint. Leave blank to use email."

      - name: "contact_cards"
        label: "Contact Cards"
        description: "Edit the office, factory, and enquiry cards shown beside the contact form."
        file: "content/contact-cards.json"
        format: "json"
        fields:
          - label: "Contact Cards"
            name: "cards"
            widget: "list"
            label_singular: "Contact Card"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - label: "Card Title"
                name: "title"
                widget: "string"
              - label: "Contact Lines"
                name: "lines"
                widget: "list"
                label_singular: "Line"
                collapsed: true
                minimize_collapsed: true
                summary: "{{fields.label}}"
                fields:
                  - label: "Line Type"
                    name: "type"
                    widget: "select"
                    options:
                      - { label: "Text", value: "text" }
                      - { label: "Email", value: "email" }
                      - { label: "Phone", value: "phone" }
                  - label: "Display Text"
                    name: "label"
                    widget: "string"
                  - label: "Email Or Phone Value"
                    name: "value"
                    widget: "string"
                    required: false
                    hint: "Only needed when the line type is Email or Phone."
                  - label: "Show As Muted Note"
                    name: "muted"
                    widget: "boolean"
                    required: false
                    default: false
              - label: "Map Button"
                name: "map"
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - label: "Button Text"
                    name: "label"
                    widget: "string"
                    required: false
                    default: "Directions"
                  - label: "Map Search Query"
                    name: "query"
                    widget: "string"
                    required: false
                    hint: "Use coordinates or the exact Google Maps place name."
                  - label: "Custom Map Embed URL"
                    name: "embedUrl"
                    widget: "string"
                    required: false
                  - label: "Directions URL"
                    name: "directionsUrl"
                    widget: "string"
                    required: false
                  - label: "Directions Button Text"
                    name: "directionsLabel"
                    widget: "string"
                    required: false
                    default: "Get directions"
